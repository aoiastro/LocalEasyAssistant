name: Build Unsigned IPA

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install XcodeGen
      run: brew install xcodegen
      
    - name: Generate Xcode Project
      run: xcodegen generate
      
    - name: Resolve Package Dependencies
      run: xcodebuild -resolvePackageDependencies -project LocalEasyAssistant.xcodeproj -scheme LocalEasyAssistant
      
    - name: Build and Archive
      run: |
        xcodebuild archive \
          -project LocalEasyAssistant.xcodeproj \
          -scheme LocalEasyAssistant \
          -configuration Release \
          -sdk iphoneos \
          -archivePath LocalEasyAssistant.xcarchive \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          AD_HOC_CODE_SIGNING_ALLOWED=YES
          
    - name: Create Unsigned IPA
      run: |
        mkdir -p Payload
        cp -r LocalEasyAssistant.xcarchive/Products/Applications/LocalEasyAssistant.app Payload/
        zip -r LocalEasyAssistant.ipa Payload
        
    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: LocalEasyAssistant-Unsigned-IPA
        path: LocalEasyAssistant.ipa
